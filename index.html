<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <title>Conteur Interactif</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <button id="btn-library" class="header-btn header-btn--library" aria-label="Ma bibliothèque">📚 Ma Bibliothèque</button>
      <div class="brand-mark" aria-hidden="true">📖</div>
      <button id="btn-parental" class="header-btn header-btn--settings" aria-label="Paramètres parents">⚙️</button>
    </header>

    <main>
      <section id="view-home" class="view view--active">
        <div class="hero-copy">
          <p class="eyebrow">Conteur interactif</p>
          <h1>Choisis une grande aventure</h1>
        </div>
        <div id="story-stage" class="story-stage">
          <button class="nav-3d nav-3d--left" id="carousel-prev" aria-label="Histoire précédente">‹</button>
          <div id="story-carousel" class="carousel-3d" aria-live="polite"></div>
          <button class="nav-3d nav-3d--right" id="carousel-next" aria-label="Histoire suivante">›</button>
        </div>
        <p id="home-hint" class="home-hint">Touchez une pochette pour écouter le titre puis démarrer l'histoire.</p>
      </section>

      <section id="view-reader" class="view hidden">
        <div class="reader-screen" id="reader-screen">
          <div class="reader-cover" id="reader-cover">
            <div class="reader-cover__emoji" id="reader-cover-emoji">📚</div>
            <div class="reader-cover__meta">
              <p id="reader-story-title" class="reader-story-title"></p>
              <h2 id="reader-headline">Prêt ?</h2>
              <p id="reader-body">L'histoire va commencer…</p>
            </div>
          </div>

          <div class="question-panel hidden" id="question-panel">
            <h3 id="current-question">Que choisis-tu ?</h3>
            <button id="btn-repeat-question" class="btn-icon" aria-label="Relire la question">👂</button>
          </div>

          <div id="choices-grid" class="choices-grid hidden"></div>

          <div class="reader-actions">
            <button id="btn-back-home" class="btn-secondary">← Accueil</button>
            <button id="btn-speak" class="btn-voice"><span class="icon">🎤</span><span class="label">Parler !</span></button>
          </div>
        </div>
      </section>

      <section id="view-library" class="view hidden">
        <div class="panel">
          <div class="panel-head">
            <h2>📚 Ma Bibliothèque</h2>
            <button id="btn-library-back" class="btn-secondary">← Retour</button>
          </div>
          <div id="library-list" class="list-container"></div>
        </div>
      </section>

      <section id="view-parental" class="view hidden">
        <div class="panel panel--narrow">
          <div id="pin-gate" class="pin-gate"></div>
          <div id="parental-content" class="hidden">
            <div class="panel-head">
              <h2>⚙️ Paramètres parents</h2>
              <button id="btn-parental-back" class="btn-secondary">← Retour</button>
            </div>
            <div class="settings-stack">
              <label class="field">
                <span>Fournisseur API</span>
                <select id="input-provider">
                  <option value="groq">Groq</option>
                  <option value="github">GitHub Models</option>
                </select>
              </label>
              <label class="field">
                <span>Clé API</span>
                <input id="input-api-key" type="password" placeholder="sk-...">
              </label>
              <label class="field">
                <span>Modèle</span>
                <input id="input-model" type="text" placeholder="llama-3.3-70b-versatile">
              </label>
              <div class="row-actions">
                <button id="btn-save-settings" class="btn-primary">Enregistrer</button>
                <button id="btn-export" class="btn-secondary">Exporter</button>
                <label class="btn-secondary upload-btn">Importer<input id="import-file" type="file" accept="application/json"></label>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section id="view-end" class="view hidden">
        <div class="panel panel--celebration">
          <div class="celebration">👏 ✨ 🎉</div>
          <h2>Bravo !</h2>
          <p>Cette aventure est terminée.</p>
          <div class="row-actions row-actions--center">
            <button id="btn-save-adventure" class="btn-primary">💾 Garder cette aventure</button>
            <button id="btn-end-home" class="btn-secondary">← Accueil</button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="src/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('./service-worker.js').catch(console.error);
  </script>
</body>
</html>
