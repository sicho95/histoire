<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <title>Conteur Interactif</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <button id="btn-library" class="header-btn header-btn--icon" aria-label="Ma bibliothèque">📚</button>
      <div id="top-title" class="top-title" aria-hidden="true">📖</div>
      <button id="btn-parental" class="header-btn header-btn--icon" aria-label="Paramètres parents">⚙️</button>
    </header>
    <main>
      <section id="view-home" class="view">
        <div id="story-carousel" class="story-carousel" aria-live="polite"></div>
      </section>

      <section id="view-reader" class="view hidden">
        <div class="reader-screen">
          <div class="cover-stage">
            <div class="cover-stage__art">
              <div id="reader-cover-emoji" class="cover-stage__emoji">📖</div>
              <div class="cover-stage__halo"></div>
            </div>
            <div class="cover-stage__meta">
              <p id="reader-story-title" class="reader-story-title"></p>
              <h2 id="reader-node-title" class="reader-node-title">Installe-toi bien…</h2>
            </div>
          </div>
          <div id="question-panel" class="question-panel hidden">
            <button id="btn-pause" class="btn-icon" aria-label="Arrêter la lecture">⏸️</button>
            <h3 id="current-question">Que choisis-tu ?</h3>
            <button id="btn-repeat-question" class="btn-icon" aria-label="Réécouter la question">👂</button>
          </div>
          <div id="choices-grid" class="choices-grid hidden"></div>
          <div class="reader-actions">
            <button id="btn-back-home" class="btn-secondary btn-control" aria-label="Accueil">🏠</button>
            <button id="btn-speak" class="btn-voice btn-control" aria-label="Parler">🎤</button>
          </div>
        </div>
      </section>

      <section id="view-library" class="view hidden">
        <div class="panel panel-scroll">
          <div class="panel-head">
            <h2>📚 Ma Bibliothèque</h2>
            <div class="row-actions">
              <label class="btn-secondary upload-btn">📥 Importer une aventure<input id="library-import-file" type="file" accept="application/json"></label>
              <button id="btn-library-back" class="btn-secondary">← Retour</button>
            </div>
          </div>
          <div id="library-list" class="list-container"></div>
        </div>
      </section>

      <section id="view-parental" class="view hidden">
        <div class="panel panel--narrow panel-scroll">
          <div id="pin-gate" class="pin-gate"></div>
          <div id="parental-content" class="hidden">
            <div class="panel-head">
              <h2>⚙️ Paramètres parents</h2>
              <button id="btn-parental-back" class="btn-secondary">← Retour</button>
            </div>
            <div class="settings-stack">
              <label class="field">
                <span>Clé API histoire</span>
                <input id="input-api-key" type="password" placeholder="sk-...">
              </label>
              <label class="field">
                <span>Clé API voix</span>
                <input id="input-tts-api-key" type="password" placeholder="Clé ElevenLabs ou OpenAI">
              </label>
              <label class="field">
                <span>Modèle histoire</span>
                <input id="input-model" type="text" placeholder="llama-3.3-70b-versatile">
              </label>
              <label class="field">
                <span>Fournisseur voix</span>
                <select id="input-tts-provider">
                  <option value="browser">Voix navigateur (gratuit, hors-ligne)</option>
                  <option value="openai">OpenAI TTS</option>
                  <option value="elevenlabs">ElevenLabs</option>
                </select>
              </label>
              <label class="field">
                <span>Voix</span>
                <select id="input-tts-voice">
                  <option value="">— Sélectionner —</option>
                  <option value="tKaoyJLW05zqV0tIH9FD" data-provider="elevenlabs">Gaëlle (ElevenLabs)</option>
                  <option value="ohItIVrXTBI80RrUECOD" data-provider="elevenlabs">Guillaume (ElevenLabs)</option>
                  <option value="aQROLel5sQbj1vuIVi6B" data-provider="elevenlabs">Nicolas (ElevenLabs)</option>
                  <option value="a5n9pJUnAhX4fn7lx3uo" data-provider="elevenlabs">Martin (ElevenLabs)</option>
                  <option value="nova" data-provider="openai">nova (OpenAI)</option>
                  <option value="alloy" data-provider="openai">alloy (OpenAI)</option>
                  <option value="echo" data-provider="openai">echo (OpenAI)</option>
                  <option value="fable" data-provider="openai">fable (OpenAI)</option>
                  <option value="onyx" data-provider="openai">onyx (OpenAI)</option>
                  <option value="shimmer" data-provider="openai">shimmer (OpenAI)</option>
                </select>
              </label>
              <label class="field">
                <span>Modèle ElevenLabs</span>
                <select id="input-tts-model">
                  <option value="eleven_multilingual_v2">eleven_multilingual_v2 — ⭐ Meilleure qualité narration FR, 29 langues</option>
                  <option value="eleven_v3">eleven_v3 — ✨ Ultra expressif, émotions riches, 70+ langues (plus lent)</option>
                  <option value="eleven_turbo_v2_5">eleven_turbo_v2_5 — ⚡ Compromis qualité/vitesse, 32 langues</option>
                  <option value="eleven_flash_v2_5">eleven_flash_v2_5 — 🚀 Ultra rapide, faible latence, 32 langues</option>
                </select>
              </label>
              <label class="field">
                <span>Qualité audio</span>
                <select id="input-tts-format">
                  <option value="mp3_44100_128">mp3_44100_128 — Haute qualité (recommandé)</option>
                  <option value="mp3_44100_64">mp3_44100_64 — Qualité standard</option>
                  <option value="mp3_22050_32">mp3_22050_32 — Légère (économie de cache)</option>
                </select>
              </label>
              <label class="field field--inline">
                <span>Forcer la langue française (ElevenLabs)</span>
                <input id="input-tts-force-french" type="checkbox">
              </label>
              <label class="field field--inline">
                <span>Mode debug</span>
                <input id="input-debug-enabled" type="checkbox">
              </label>
              <div class="offline-box">
                <div>
                  <h3>Préparer le hors-ligne</h3>
                  <p id="offline-cache-status">Aucun cache audio.</p>
                </div>
                <div class="row-actions">
                  <button id="btn-precache-base-audio" class="btn-primary">Précharger les histoires de base</button>
                  <button id="btn-clear-audio-cache" class="btn-secondary">Vider le cache audio</button>
                </div>
              </div>
              <div class="row-actions">
                <button id="btn-save-settings" class="btn-primary">Enregistrer</button>
                <button id="btn-export" class="btn-secondary">Exporter</button>
                <label class="btn-secondary upload-btn">Importer<input id="import-file" type="file" accept="application/json"></label>
              </div>
              <div class="row-actions">
                <button id="btn-download-debug" class="btn-secondary">⬇️ Debug TXT</button>
                <button id="btn-clear-debug" class="btn-secondary">🧹 Vider debug</button>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section id="view-wizard" class="view hidden">
        <div class="panel panel--narrow panel-scroll">
          <div class="panel-head"><h2>➕ Nouvelle histoire</h2><button id="btn-wizard-back" class="btn-secondary">← Retour</button></div>
          <div class="settings-stack">
            <label class="field"><span>Héros</span><input id="wizard-hero" type="text" value="Milo"></label>
            <label class="field"><span>Univers</span><input id="wizard-world" type="text" value="forêt magique"></label>
            <label class="field"><span>But</span><input id="wizard-goal" type="text" value="retrouver une lumière perdue"></label>
            <div class="row-actions"><button id="btn-create-story" class="btn-primary">Créer l'histoire</button></div>
          </div>
        </div>
      </section>

      <section id="view-end" class="view hidden">
        <div class="panel panel--celebration">
          <div class="celebration">👏 ✨ 🎉</div>
          <h2>Bravo !</h2>
          <p>Cette aventure est terminée.</p>
          <div class="row-actions row-actions--center">
            <button id="btn-save-adventure" class="btn-primary">💾 Garder cette aventure</button>
            <button id="btn-end-home" class="btn-secondary">← Accueil</button>
          </div>
        </div>
      </section>
    </main>
  </div>
  <script type="module" src="src/app.js"></script>
</body>
</html>
